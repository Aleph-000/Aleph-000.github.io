info:
  title: Aleph_null's Blog
  subtitle: 浙江大学学生 / AI 与编程学习者 / 独立开发爱好者
  author: Aleph_null
  url: https://aleph-000.github.io

defaults:
  favicon: /images/favicon.svg
  logo:
  avatar: /images/avatar.svg

colors:
  primary: "#A31F34"
  secondary:
  default_mode: light

global:
  content_max_width: 1000px
  sidebar_width: 210px
  hover:
    shadow: true
    scale: false
  scroll_progress:
    bar: false
    percentage: true
  website_counter:
    url: https://cn.vercount.one/js
    enable: true
    site_pv: true
    site_uv: true
    post_pv: true
  single_page: true
  preloader:
    enable: false
  open_graph:
    enable: true
    image: /images/redefine-og.webp
    description: Aleph_null 的个人博客，记录全栈 AI 开发、项目、CTF、图寻与学习思考。
  google_analytics:
    enable: false

home_banner:
  enable: true
  style: fixed
  image:
    light: /images/wallhaven-wqery6-light.webp
    dark: /images/wallhaven-wqery6-dark.webp
  title: Aleph_null
  subtitle:
    text:
      - 浙江大学计算机科学与技术专业
      - AI / Full-stack / CTF / 图寻
      - 用数学和工程把想法落地。
    hitokoto:
      enable: false
      show_author: false
      api: https://v1.hitokoto.cn
    typing_speed: 100
    backing_speed: 80
    starting_delay: 500
    backing_delay: 1500
    loop: true
    smart_backspace: true
  text_color:
    light: "#fff"
    dark: "#d1d1b6"
  text_style:
    title_size: 2.8rem
    subtitle_size: 1.5rem
    line_height: 1.2
  custom_font:
    enable: false
  social_links:
    enable: true
    style: default
    links:
      github: https://github.com/Aleph-000
    qrs:
      weixin:

navbar:
  auto_hide: false
  color:
    left: "#f78736"
    right: "#367df7"
    transparency: 35
  width:
    home: 1200px
    pages: 1000px
  links:
    Home:
      path: /
      icon: fa-regular fa-house
    Archives:
      path: /archives
      icon: fa-regular fa-archive
    About:
      icon: fa-regular fa-user
      submenus:
        Me: /about
        Github: https://github.com/Aleph-000
    Projects:
      path: /projects
      icon: fa-regular fa-code
    Categories:
      path: /categories
      icon: fa-regular fa-folder
    Tags:
      path: /tags
      icon: fa-regular fa-tags
  search:
    enable: true
    preload: true

home:
  sidebar:
    enable: true
    position: left
    first_item: menu
    announcement: 记录 AI 开发、项目实践、CTF 与学习思考。
    show_on_mobile: true
    links:
      About:
        path: /about
        icon: fa-regular fa-user
      Archives:
        path: /archives
        icon: fa-regular fa-archive
      Projects:
        path: /projects
        icon: fa-regular fa-code
      Tags:
        path: /tags
        icon: fa-regular fa-tags
      Categories:
        path: /categories
        icon: fa-regular fa-folder
  article_date_format: auto
  excerpt_length: 200
  categories:
    enable: true
    limit: 3
  tags:
    enable: true
    limit: 3

articles:
  style:
    font_size: 16px
    line_height: 1.7
    image_border_radius: 14px
    image_alignment: center
    image_caption: false
    link_icon: true
    delete_mask: false
    title_alignment: left
    headings_top_spacing:
      h1: 3.2rem
      h2: 2.4rem
      h3: 1.9rem
      h4: 1.6rem
      h5: 1.4rem
      h6: 1.3rem
  word_count:
    enable: true
    count: true
    min2read: true
  toc:
    enable: true
    max_depth: 3
    number: false
    expand: true
    init_open: true
  copyright:
    enable: true
    default: cc_by_nc_sa
  lazyload: true
  pangu_js: true
  recommendation:
    enable: false

comment:
  enable: false

footer:
  runtime: true
  icon: '<i class="fa-solid fa-heart fa-beat" style="--fa-animation-duration: 0.5s; color: #f54545"></i>'
  start: 2026/07/04 00:00:00
  statistics: true
  customize: '个人网站正在持续更新。'
  icp:
    enable: false

plugins:
  feed:
    enable: false
  aplayer:
    enable: false
  mermaid:
    enable: false

page_templates:
  friends_column: 2
  tags_style: blur

inject:
  enable: true
  head:
    - |
      <style>
        .home-banner-container .description {
          text-shadow: 0 8px 30px rgba(0, 0, 0, 0.38);
          letter-spacing: 0;
        }
        .home-article-item,
        .sidebar-content,
        .sidebar-links {
          backdrop-filter: blur(12px);
        }
        .article-content h2,
        .article-content h3 {
          letter-spacing: 0;
        }
      </style>
  footer:
    -
