services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aleph_blog}
      POSTGRES_USER: ${POSTGRES_USER:-aleph_blog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aleph_blog} -d ${POSTGRES_DB:-aleph_blog}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-aleph_blog}:${POSTGRES_PASSWORD:-change-me}@db:5432/${POSTGRES_DB:-aleph_blog}
      SECRET_KEY: ${SECRET_KEY:-change-me-before-public-deploy}
      OWNER_USERNAME: ${OWNER_USERNAME:-Aleph_null}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      ACCESS_TOKEN_MINUTES: ${ACCESS_TOKEN_MINUTES:-10080}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
