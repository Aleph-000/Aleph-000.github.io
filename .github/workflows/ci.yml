name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Python dependencies
        run: python -m pip install -r api/requirements.txt

      - name: Run API tests
        run: python -m pytest api/tests -q

      - name: Build static site
        run: |
          pnpm clean
          pnpm build

      - name: Validate Docker Compose
        env:
          POSTGRES_PASSWORD: ci-postgres-password
          SECRET_KEY: ci-secret-key
          OWNER_SETUP_KEY: ci-owner-setup-key
        run: docker compose -f docker-compose.aliyun.yml config >/dev/null

      - name: Build API image
        run: docker build -f api/Dockerfile -t aleph-blog-api:ci .
